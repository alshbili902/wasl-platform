# === إعدادات Nginx كخادم وكيل عكسي (Reverse Proxy) ===
# يوّجه الطلبات بين الواجهة الأمامية والخلفية

upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;
    
    # حجم أقصى للملفات المرفوعة (100 ميجابايت)
    client_max_body_size 100M;
    
    # ضغط المحتوى
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
    
    # === توجيه طلبات API إلى الخادم الخلفي ===
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # إعدادات المهلة الزمنية (للملفات الكبيرة)
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
    
    # === توجيه طلبات تحميل الملفات ===
    location /files/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # === توجيه باقي الطلبات إلى الواجهة الأمامية ===
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # دعم WebSocket (لـ Hot Reload أثناء التطوير)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
